# thesis-agent configuration
# Example: Vertical AI in Regulated Industries
# Author: Lachlan Sear

thesis:
  name: "Vertical AI in Regulated Industries"
  version: "2.0"

  core_belief: >
    Horizontal AI wrappers lack defensible moats. Vertical AI specialists
    win through domain expertise, regulatory complexity, and data flywheels.
    The best opportunities are in regulated industries where the workflow
    is intelligence-heavy, the buying decision requires trust, and the
    incumbent software is decades behind.

  target_verticals:
    primary:
      - "healthcare"
      - "legal"
      - "dental"
      - "veterinary"
    secondary:
      - "insurance"
      - "accounting"
      - "compliance"
      - "education"
    emerging:
      - "AI-enabled consumer services"
      - "digital-first healthcare (mental health, preventive, diagnostics)"
      - "regulation-heavy fintech (insurance, tax, property)"

  signals_positive:
    - "Domain-specific training data or proprietary dataset"
    - "Regulatory moat (licensing, certification, compliance)"
    - "Replaces outsourced service spend, not tool spend"
    - "Founder with industry operating experience"
    - "Vertical-specific workflow automation, not horizontal wrapper"
    - "Revenue model tied to outcomes, not seats"
    - "Network effects or data flywheel potential"
    - "Enduring customer relationship (5-10+ year potential)"
    - "Strong unit economics with clear path to profitability"
    - "Autopilot potential — selling the outcome, not the tool"

  signals_negative:
    - "Thin wrapper on foundation model API"
    - "No domain-specific data advantage"
    - "Competing directly with model provider roadmap"
    - "Horizontal positioning across multiple unrelated verticals"
    - "No regulatory or switching cost moat"
    - "Unsustainable growth without retention"
    - "Market too small (<$1B TAM)"

  stage_focus:
    primary: "seed"
    range_min: "pre-seed"
    range_max: "series-b"
    sweet_spot: "Seed to Series A"

  geography:
    primary: ["europe", "uk"]
    secondary: ["us"]

  evaluation_rubric:
    thesis_fit: "How well does this company match the vertical AI thesis? (1-10)"
    customer_durability: "How enduring is the customer relationship? (1-10)"
    regulation_moat: "How defensible is the position via regulatory complexity? (1-10)"
    unit_economics: "Are unit economics strong or clearly improving? (1-10)"
    growth_inflection: "Is the company at or approaching breakout growth? (1-10)"
    founder_quality: "Domain expertise, technical depth, founder-market fit? (1-10)"
    autopilot_potential: "Per Sequoia framework — selling the work, not the tool? (1-10)"
    funding_stage_score: "Quality of cap table — investor tier, follow-on, cleanliness? (1-10)"
    tam_score: "Total addressable market — venture-scale opportunity? (1-10)"
    revenue_model_score: "Durability and quality of revenue model? (1-10)"
    gtm_score: "Go-to-market efficiency — sales cycle, CAC, distribution? (1-10)"
    geo_scalability: "Can this expand beyond home market? (1-10)"
    exit_potential: "Clear acquirers, IPO path, comparable exits? (1-10)"

  autopilot_lens:
    enabled: true
    description: >
      Per Sequoia's 'Services: The New Software' framework — is this company
      selling the work (autopilot) rather than the tool (copilot)? Companies
      that capture service/labour budgets rather than software budgets have
      larger TAM and stronger lock-in.

sources:
  # --- Scout Sources ---
  web_search:
    enabled: true
    queries_per_vertical: 5
    recency: "30d"

  hacker_news:
    enabled: true
    endpoints:
      - "https://hacker-news.firebaseio.com/v0/showstories.json"
      - "https://hacker-news.firebaseio.com/v0/topstories.json"
    keywords_filter: true

  companies_house:
    enabled: true
    api_base: "https://api.company-information.service.gov.uk"
    sic_codes:
      - "62012"  # Software development
      - "62090"  # Other IT service activities
      - "86101"  # Hospital activities
      - "86210"  # General medical practice
      - "86230"  # Dental practice activities
      - "75000"  # Veterinary activities

  github_trending:
    enabled: true
    languages: ["python", "typescript", "rust"]
    min_stars_velocity: 50

  rss_feeds:
    enabled: true
    feeds:
      - name: "Sifted"
        url: "https://sifted.eu/feed"
        focus: "European startup ecosystem"
      - name: "TechCrunch Startups"
        url: "https://techcrunch.com/category/startups/feed/"
        focus: "Global startup news, funding"
      - name: "EU-Startups"
        url: "https://www.eu-startups.com/feed/"
        focus: "European startup ecosystem"

  # --- Radar Sources ---
  # Regulatory monitoring — these are search queries, not coded sources.
  # The Radar agent uses Claude web search with these specific queries
  # to catch regulatory changes that create new moats or open windows.
  regulatory_monitoring:
    enabled: true
    queries:
      # Veterinary
      - "RCVS regulatory update 2026"
      - "CMA veterinary market investigation final decision"
      - "CMA veterinary services remedies 2026"
      - "veterinary practice regulation UK changes"

      # Healthcare
      - "CQC new inspection framework digital health 2026"
      - "MHRA medical device software regulation AI"
      - "NHS digital compliance new requirements"
      - "FDA digital health pre-certification 2026"
      - "EU MDR AI medical device classification"

      # Legal
      - "SRA solicitors regulation technology guidance 2026"
      - "legal services regulation AI UK"
      - "LSB legal services board innovation"

      # Financial
      - "FCA regulatory sandbox new cohort 2026"
      - "FCA consumer duty digital services"
      - "PRA insurtech regulation update"

      # Cross-vertical
      - "EU AI Act enforcement timeline 2026"
      - "UK AI regulation DSIT framework"
      - "ICO AI data protection guidance"
      - "GDPR automated decision making enforcement"

  # Podcast monitoring — the Radar agent also scans these
  # but they're primarily used by the Scout agent for discovery
  podcast_feeds:
    - name: "20VC"
      url: "https://feeds.megaphone.fm/twentyminutevc"
      signal: "Founder appearance = imminent or recent fundraise"
    - name: "Riding Unicorns"
      url: "https://feeds.acast.com/public/shows/riding-unicorns"
      signal: "European early-stage founder signal"

  # Investor activity tracking — Radar agent searches for these
  investor_tracking:
    enabled: true
    watch_list:
      # European funds in thesis verticals
      - "Balderton Capital"
      - "Northzone"
      - "Earlybird"
      - "Atomico"
      - "Index Ventures"
      - "Accel Europe"
      - "Singular"
      - "firstminute capital"
      # US funds active in Europe
      - "Sequoia Capital"
      - "a16z"
      - "General Catalyst"
      - "Bessemer"
      # Vertical specialists
      - "Khosla Ventures"
      - "GV"
      - "Lux Capital"
    queries:
      - "{investor} new investment 2026"
      - "{investor} seed series A healthcare legal fintech 2026"
      - "{investor} European portfolio company 2026"

scheduling:
  scout: "daily"
  radar_funding: "daily"
  radar_regulatory: "weekly"
  radar_synthesis: "weekly"
  ops: "weekly"
  timezone: "Europe/London"
  run_time: "07:00"
